<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@800&family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            
            background: linear-gradient(180deg, #0f172a 0%, #1e1b4b 35%, #581c87 70%, #9333ea 100%);
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        .welcome-container {
            text-align: center;
            padding: 20px;
            width: 100%;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            
            font-size: clamp(3rem, 12vw, 7rem);
            line-height: 1;
            margin-bottom: 10px;
            letter-spacing: -2px;
            animation: fadeInDown 1s ease-out;
        }

        p {
            color: yellow;
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: clamp(1.2rem, 4vw, 2.2rem);
            margin-bottom: 40px;
            letter-spacing: 2px;
            animation: fadeInUp 1s ease-out 0.3s backwards;
        }

        .btn {
            display: inline-block;
            padding: 18px 45px;
            background: white;
            color: #1e1b4b;
            border: none;
            border-radius: 50px; 
            text-decoration: none;
            font-weight: 800;
            font-size: 1.5rem;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            animation: fadeInUp 1s ease-out 0.6s backwards;
        }

        .btn:hover {
            transform: translateY(-5px) scale(1.05);
            background: red;
            color: white;
            box-shadow: 0 15px 30px rgba(255, 255, 0, 0.4);
        }

        
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        
        @media (max-width: 600px) {
            h1 { letter-spacing: 0; }
            .btn { width: 80%; padding: 15px 0; }
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>HELLO FRIENDS</h1>
        <p>LET'S WATCH MY PORTFOLIO</p>
        <a href="Home.html" class="btn">LET'S START</a>
    </div>

</body>
</html>
